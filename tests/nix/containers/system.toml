version = 1
name = "nix-check-system"

[deploy]
target = "system"
activation = "startup"

[config.container]
hostname = "nix-check-system.local"
user = "1000"
group = "1000"
workingDir = "/workspace"
environmentFile = ["/etc/graft/system.env", "/run/graft/shared.env"]

[config.container.environment]
LOG_LEVEL = "debug"
EMPTY = ""
EQUALS = "a=b"
GREETING = "hello world"
PATHLIKE = "C:\\Temp"
PERCENT = "100%"
QUOTED = "say \"hi\""

[[config.filesystem.tmpfs]]
target = "/run/graft-system"
mode = "0750"
size = "64M"

[[config.filesystem.tmpfs]]
target = "/tmp/graft-system"

[[config.filesystem.volumes]]
target = "/system-cache"

[[config.filesystem.binds]]
source = "/tmp/graft-system-data"
target = "/data"
readOnly = false

[[config.filesystem.binds]]
source = "/tmp/graft-system-config"
target = "/config"
readOnly = true

[config.network]
publish = ["127.0.0.1:18080:80", "18443:443/tcp"]

[config.service]
lifecycle = "long-running"
restart = "on-failure"
restartSec = "10s"
timeoutStartSec = "2m"
timeoutStopSec = "30s"
