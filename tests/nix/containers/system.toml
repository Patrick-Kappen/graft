version = 1
name = "nix-check-system"

[config.container]
hostname = "nix-check-system.local"
user = "1000"
group = "1000"
workingDir = "/workspace"
environmentFile = [
  "/etc/graft/system.env",
  "/run/graft/shared.env",
]

[config.container.environment]
LOG_LEVEL = "debug"
EMPTY = ""

[[config.filesystem.volumes]]
target = "/system-cache"

[[config.filesystem.volumes]]
source = "/tmp/graft-system-data"
target = "/data"

[[config.filesystem.volumes]]
source = "/tmp/graft-system-config"
target = "/config"
mode = "ro"

[config.network]
publish = [
  "127.0.0.1:18080:80",
  "18443:443/tcp",
]

[config.service]
restartSec = "10s"
timeoutStartSec = "2m"
timeoutStopSec = "30s"
