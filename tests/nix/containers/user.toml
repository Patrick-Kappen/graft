version = 1
name = "nix-check-user"

[deploy]
target = "user"
activation = "startup"

[config.container]
hostname = "nix-check-user.local"
user = "1000"
group = "1000"
workingDir = "/workspace"
environmentFile = ["/etc/graft/user.env", "/run/graft/shared.env"]

[config.container.environment]
LOG_LEVEL = "debug"
EMPTY = ""
EQUALS = "a=b"
GREETING = "hello world"
PATHLIKE = "C:\\Temp"
PERCENT = "100%"
QUOTED = "say \"hi\""

[[config.filesystem.tmpfs]]
target = "/run/graft-user"
mode = "0750"
size = "64M"

[[config.filesystem.tmpfs]]
target = "/tmp/graft-user"

[[config.filesystem.volumes]]
target = "/user-cache"

[[config.filesystem.binds]]
source = "/tmp/graft-user-data"
target = "/data"
readOnly = false

[[config.filesystem.binds]]
source = "/tmp/graft-user-config"
target = "/config"
readOnly = true

[config.network]
publish = ["127.0.0.1:28080:80", "28443:443/tcp"]

[config.service]
lifecycle = "long-running"
restart = "on-failure"
restartSec = "10s"
timeoutStartSec = "2m"
timeoutStopSec = "30s"
