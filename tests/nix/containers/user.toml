version = 1
name = "nix-check-user"

[deploy]
target = "user"

[config.container]
hostname = "nix-check-user.local"
user = "1000"
workingDir = "/workspace"
environmentFile = [
  "/etc/graft/user.env",
  "/run/graft/shared.env",
]

[config.container.environment]
LOG_LEVEL = "debug"
EMPTY = ""

[[config.filesystem.volumes]]
target = "/user-cache"

[[config.filesystem.volumes]]
source = "/tmp/graft-user-data"
target = "/data"

[[config.filesystem.volumes]]
source = "/tmp/graft-user-config"
target = "/config"
mode = "ro"

[config.network]
publish = [
  "127.0.0.1:28080:80",
  "28443:443/tcp",
]
