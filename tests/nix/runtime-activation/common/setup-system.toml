version = 1
name = "setup-system"

[deploy]
target = "system"
activation = "startup"

[config.runtime]
packages = ["bash"]
command = ["/bin/bash", "-c", "printf 'setup\\n' >> /state/setup-runs"]

[[config.filesystem.binds]]
source = "/var/lib/graft-activation"
target = "/state"
readOnly = false

[config.service]
lifecycle = "setup"
