version = 1
name = "startup-job-system"

[deploy]
target = "system"
activation = "startup"

[config.runtime]
packages = ["bash"]
command = ["/bin/bash", "-c", "printf 'job\\n' >> /state/job-runs"]

[[config.filesystem.binds]]
source = "/var/lib/graft-activation"
target = "/state"
readOnly = false

[config.service]
lifecycle = "job"
