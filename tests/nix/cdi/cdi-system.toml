version = 1
name = "nix-check-cdi-system"

[deploy]
target = "system"

[config.filesystem]
readOnly = true

[[config.filesystem.devices]]
source = "nvidia.com/gpu=all"

[[config.filesystem.devices]]
source = "vendor.example/device_class=device-1.2"

[config.security]
dropCapabilities = ["all"]
addCapabilities = ["CAP_NET_BIND_SERVICE", "CAP_CHOWN"]
noNewPrivileges = true
