name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Workflow lint
        run: nix develop .#ci -c actionlint

      - name: Rust checks
        run: |
          nix develop .#ci -c bash -lc '
            set -euo pipefail
            cd crates/graft
            cargo fmt --check
            cargo test
            cargo clippy --all-targets -- -D warnings -D clippy::pedantic
            cargo-audit audit
          '

      - name: Docs checks
        run: nix develop .#ci -c mdbook build

      - name: Nix checks
        run: |
          nix build .#packages.x86_64-linux.default
          nix flake check
