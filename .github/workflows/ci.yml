name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  workflow_lint:
    name: workflow-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Workflow lint
        run: nix develop .#ci -c actionlint

  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Rust checks
        run: |
          nix develop .#ci -c bash -lc '
            set -euo pipefail
            cd crates/graft
            cargo fmt --check
            cargo test
            cargo clippy --all-targets -- -D warnings -D clippy::pedantic
          '

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Security checks
        run: nix develop .#ci -c bash -lc 'cd crates/graft && cargo-audit audit'

  docs:
    name: docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Docs checks
        run: nix develop .#ci -c mdbook build

  nix:
    name: nix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Nix checks
        run: |
          nix build .#packages.x86_64-linux.default
          nix build \
            .#checks.x86_64-linux.nixos-module-eval \
            .#checks.x86_64-linux.home-manager-module-eval \
            --print-out-paths
          nix flake check

  checks:
    name: checks
    runs-on: ubuntu-latest
    needs:
      - workflow_lint
      - rust
      - security
      - docs
      - nix
    if: ${{ always() }}

    steps:
      - name: Check named jobs
        run: |
          test '${{ needs.workflow_lint.result }}' = 'success'
          test '${{ needs.rust.result }}' = 'success'
          test '${{ needs.security.result }}' = 'success'
          test '${{ needs.docs.result }}' = 'success'
          test '${{ needs.nix.result }}' = 'success'
