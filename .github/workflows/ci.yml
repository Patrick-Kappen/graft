name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  workflow_lint:
    name: workflow-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Workflow lint
        run: |
          nix develop .#ci -c actionlint
          nix develop .#ci -c zizmor --no-progress --color never --min-confidence high .github/workflows/*.yml .github/actions/setup-nix/action.yml

  rust:
    name: rust
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN_CONFIGURED: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Rust checks
        run: |
          nix develop .#ci -c bash -lc '
            set -euo pipefail
            cd crates/graft
            cargo fmt --check
            mkdir -p target/nextest
            cargo nextest run --profile ci
            cargo test --doc
            cargo clippy --all-targets -- -D warnings -D clippy::pedantic
            cargo machete
            NO_COLOR=1 cargo modules orphans --lib
            NO_COLOR=1 cargo modules orphans --bin graft-pause
          '

      - name: Upload test results
        if: ${{ always() && !cancelled() && env.CODECOV_TOKEN_CONFIGURED == 'true' && hashFiles('crates/graft/target/nextest/ci/junit.xml') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: crates/graft/target/nextest/ci/junit.xml
          flags: rust
          report_type: test_results

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Rust coverage
        run: |
          nix develop .#ci -c bash <<'EOF'
          set -euo pipefail
          cd crates/graft
          mkdir -p target/coverage
          export LLVM_COV="$(command -v llvm-cov)"
          export LLVM_PROFDATA="$(command -v llvm-profdata)"
          cargo llvm-cov --workspace --all-features --fail-under-lines 80 --lcov --output-path target/coverage/lcov.info
          EOF

      - name: Upload coverage
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: crates/graft/target/coverage/lcov.info
          flags: rust
          slug: Patrick-Kappen/graft

  security:
    name: security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Security checks
        run: |
          nix develop .#ci -c bash <<'EOF'
          set -euo pipefail

          cd crates/graft
          cargo-audit audit
          cd ../..

          cargo deny --manifest-path crates/graft/Cargo.toml check --config deny.toml

          scan_root=$(mktemp -d)
          cleanup() {
            rm -rf "${scan_root}"
          }
          trap cleanup EXIT

          git ls-files -z | tar --null --files-from=- -cf - | tar -xf - -C "${scan_root}"
          gitleaks dir --no-banner --no-color --redact "${scan_root}"
          EOF

  docs:
    name: docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Docs checks
        run: |
          nix develop .#ci -c bash -lc '
            set -euo pipefail
            git ls-files "*.toml" -z | xargs -0 taplo format --check
            git ls-files "*.toml" -z | xargs -0 taplo lint

            trap "rm -f tests/nix/containers/schema-invalid.toml /tmp/graft-taplo-invalid.log" EXIT
            printf "%s\n" \
              "version = 1" \
              "name = \"schema-invalid\"" \
              "" \
              "[config.security]" \
              "privileged = true" \
              > tests/nix/containers/schema-invalid.toml
            if taplo lint tests/nix/containers/schema-invalid.toml >/tmp/graft-taplo-invalid.log 2>&1; then
              echo "Taplo accepted a reserved field; schema association is inactive" >&2
              exit 1
            fi
            grep -Fq "is not valid" /tmp/graft-taplo-invalid.log
            grep -Fq "security" /tmp/graft-taplo-invalid.log
            rm -f tests/nix/containers/schema-invalid.toml /tmp/graft-taplo-invalid.log
            trap - EXIT

            git ls-files "*.md" -z | xargs -0 markdownlint-cli2 --config .markdownlint.jsonc
            mdbook build
          '

  nix:
    name: nix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Nix checks
        run: |
          nix develop .#ci -c bash -lc '
            set -euo pipefail
            git ls-files "*.nix" -z | xargs -0 nixfmt --check
            statix check .
            deadnix --fail .
            shellcheck tests/runtime/network.sh
          '
          nix build .#packages.x86_64-linux.default
          nix build \
            .#checks.x86_64-linux.nixos-module-eval \
            .#checks.x86_64-linux.home-manager-module-eval \
            .#checks.x86_64-linux.quadlet-lifecycle \
            .#checks.x86_64-linux.quadlet-network \
            --print-out-paths
          nix flake check
          network_rootfs=$(nix build \
            .#checks.x86_64-linux.network-runtime-rootfs \
            --no-link \
            --print-out-paths)
          GRAFT_REQUIRE_NETWORK_RUNTIME=1 \
            nix develop .#ci -c tests/runtime/network.sh "${network_rootfs}"

  checks:
    name: checks
    runs-on: ubuntu-latest
    needs:
      - workflow_lint
      - rust
      - coverage
      - security
      - docs
      - nix
    if: ${{ always() }}

    steps:
      - name: Check named jobs
        run: |
          test '${{ needs.workflow_lint.result }}' = 'success'
          test '${{ needs.rust.result }}' = 'success'
          test '${{ needs.coverage.result }}' = 'success'
          test '${{ needs.security.result }}' = 'success'
          test '${{ needs.docs.result }}' = 'success'
          test '${{ needs.nix.result }}' = 'success'
