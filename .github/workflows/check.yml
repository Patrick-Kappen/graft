name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: gofmt
        run: |
          nix develop -c bash -c 'files=$(gofmt -l cmd internal); test -z "$files" || { echo "$files"; exit 1; }'
      - name: nixfmt
        run: nix develop -c bash -c 'find flake.nix nix -type f -name '\''*.nix'\'' -print0 | xargs -0 nixfmt --check'
      - name: go test
        run: nix develop -c go test ./...
      - name: go vet
        run: nix develop -c go vet ./...
      - name: golangci-lint
        run: nix develop -c golangci-lint run ./...
      - name: statix
        run: nix develop -c statix check .
      - name: deadnix
        run: nix develop -c deadnix .
      - name: flake check
        run: nix flake check --no-build
