version = 1
name = "podman-agent-container"

[config.runtime]
mode = "rootfs-store"
packages = [
  "bashInteractive",
  "coreutils",
]
command = ["bash", "-lc", "echo hello from podman-agent-container"]

[config.container]
workingDir = "/workspace"

[config.container.environment]
PAC_EXAMPLE = "1"

[config.filesystem]
readOnly = true
readOnlyTmpfs = true
tmpfs = ["/tmp", "/run", "/workspace"]

[[config.filesystem.volumes]]
source = "/nix/store"
target = "/nix/store"
mode = "ro"

[config.network]
mode = "none"

[config.security]
dropCapabilities = ["all"]
noNewPrivileges = true
userns = "keep-id"

[config.resources]
memory = "1g"
pidsLimit = 512
