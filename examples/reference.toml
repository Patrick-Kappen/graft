# graft — complete configuration reference
#
# This file exercises every field graft currently understands, with brief inline
# notes. It is a REFERENCE, not a recommended config: it deliberately mixes
# options you would normally not combine. Copy only the parts you need.
#
# Principle: empty means no-op. graft never enables anything you did not set.
# The loader is strict — unknown fields are rejected.
#
# Validate this file with:
#   graft inspect examples/reference.toml
#
# Note: the direct CLI render/run path does not yet resolve the graph
# (parents/children) or apply config.runtime.packageOps; those are applied by the
# NixOS / Home Manager modules, which render the effective config.

version = 1                    # schema version; must be 1
name = "reference"             # container/unit name and graph node id

# --- Graph: compose with other configs (resolved by the NixOS/HM modules) ---
# Refs are relative to configRoot, without the .toml suffix, e.g. "base/server".
[parents]
add = []                       # parents are merged before self
remove = []                    # drop refs after set/add normalization
set = []                       # replace this node's parent refs entirely

[children]
add = []                       # children are merged after self
remove = []
set = []

# --- Deploy: opt-in for the NixOS / Home Manager modules ---
# The fast `graft up` flow ignores this; only the modules read it.
[deploy]
enable = true                  # without this, the modules skip the file
target = "system"              # "system" (NixOS) | "user" (Home Manager)

# --- Validation level (reserved; strict checks are on the roadmap) ---
[validation]
level = "warn"                 # "off" | "warn" | "strict"

# ============================================================================
# [config] — everything below describes the actual container.
# ============================================================================

# --- Runtime: what runs, and which packages are on PATH ---
[config.runtime]
mode = "rootfs-store"          # only supported mode today (no image build)
packages = ["bashInteractive", "coreutils", "hello"] # realised as pkgs.<name> closures
command = ["bash", "-lc", "echo hello from the graft reference"]

# packageOps are applied by the NixOS/HM modules after the graph merge.
[config.runtime.packageOps]
add = ["gnugrep"]
remove = ["coreutils"]

[[config.runtime.packageOps.replace]]
name = "hello"
with = "hostname"

# --- Container identity, command and environment ---
[config.container]
# name = "override-name"       # defaults to the top-level `name`
hostname = "reference"
entrypoint = []                # optional; prepended before the command
stopSignal = "SIGTERM"
workingDir = "/workspace"
user = "1000"
group = "1000"
podmanArgs = []                # raw extra args passed to podman

[config.container.environment]
GRAFT_REFERENCE = "1"

# --- Filesystem isolation ---
[config.filesystem]
readOnly = true                # read-only rootfs
readOnlyTmpfs = true
tmpfs = ["/tmp", "/run", "/workspace"]
mounts = ["type=bind,src=/etc/hosts,dst=/etc/hosts,ro=true"]

[[config.filesystem.volumes]]  # explicit bind mounts (targets must be unique)
source = "/nix/store"
target = "/nix/store"
mode = "ro"

[[config.filesystem.devices]]
source = "/dev/fuse"
target = "/dev/fuse"
permissions = "rwm"

# --- Container network attachment ---
[config.network]
mode = "none"                  # "none" | "host" | "<name>.network" | bridge ...
publish = []                   # e.g. ["127.0.0.1:8080:8080"]
dns = []
addHost = []                   # e.g. ["host.containers.internal:host-gateway"]

# --- Extra Quadlet .network units rendered alongside the container ---
[[config.networks]]
name = "graft-internal"
driver = "bridge"
internal = true
ipv6 = false
subnet = "10.89.0.0/24"
gateway = "10.89.0.1"
ipRange = "10.89.0.128/25"
dns = ["10.89.0.1"]
options = ["mtu=1500"]

[config.networks.labels]
managed-by = "graft"

[config.networks.quadlet]      # raw [Network] passthrough
Label = ["com.example.net=1"]

# --- Extra Quadlet .volume units ---
[[config.volumes]]
name = "graft-cache"
driver = "local"
copy = false
options = ["o=noatime"]

[config.volumes.labels]
managed-by = "graft"

[config.volumes.quadlet]       # raw [Volume] passthrough
Label = ["com.example.vol=1"]

# --- Security hardening ---
[config.security]
dropCapabilities = ["all"]
addCapabilities = []
noNewPrivileges = true
privileged = false
seccompProfile = ""            # path to a seccomp.json
securityLabelDisable = false
securityOpt = []               # e.g. ["apparmor=unconfined"]
userns = "keep-id"

# --- Resource limits ---
[config.resources]
memory = "1g"
memorySwap = "2g"
cpus = "2"
cpuQuota = "50%"
pidsLimit = 512
ulimits = ["nofile=1024:2048"]

# --- Podman secrets (reference only; never put secret bytes in TOML/store) ---
[[config.secrets]]
name = "api-token"
target = "/run/secrets/api-token"
type = "mount"
uid = "1000"
gid = "1000"
mode = "0400"
options = ""

# --- Agent/update isolation primitives (used by `graft up`/`run`) ---
[config.workspace]
mode = "copy"                  # "none" | "copy"
source = "."
target = "/workspace"
review = "diff"                # "diff" prints a recursive diff on exit

[config.home]
ephemeral = true               # temporary HOME + XDG_* dirs in the container
target = "/home/user"
# mode = "session"             # copy source on start; review/promote on stop
# source = "~/.local/share/graft/my-container/home"   # requires mode = "session"
# review = "diff"              # print a diff before promote (session mode only)
# promote = "prompt"           # "auto" | "prompt" | "never" (session mode only)

# Shadow mounts: extra writable paths backed by per-session copies.
# Use `graft diff <name>` to review changes, `graft promote <name>` to push
# them back to the host path. `graft reset <name>` clears all session data.
# [[config.home.shadow]]
# container = "/workspace"      # path inside the container
# host = "~/projects/my-app"    # host directory (seeded on start, promote target)

# --- Attach behaviour (used by `graft attach` and `graft <name>`) ---
[config.attach]
tmuxSession = "main"           # tmux session name to attach to or create
shell = "sh"                   # fallback shell when tmux is not in the container
startDelay = "500ms"           # how long to wait after `graft up` before attaching

# --- systemd [Service] options ---
[config.service]
type = "oneshot"               # simple | oneshot | notify ...
restart = "on-failure"
restartSec = "10s"
timeoutStartSec = "2m"
timeoutStopSec = "30s"
remainAfterExit = false
restartIfChanged = true        # set to false to keep a running container alive during nixos-rebuild

# --- Raw Quadlet passthrough (escape hatch; review carefully) ---
# Keys render verbatim. config.quadlet.container must NOT set keys the typed
# renderer owns (Rootfs/ContainerName/Exec/Network/Volume) — that is rejected.
[config.quadlet.container]
Annotation = ["com.example/note=reference"]

[config.quadlet.service]
Environment = ["FROM_SERVICE=1"]

[config.quadlet.install]
WantedBy = ["default.target"]
